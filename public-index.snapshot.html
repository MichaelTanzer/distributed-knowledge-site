<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distributed Knowledge</title>
  <meta name="description" content="Distributed Knowledge." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --bg: #6f736d;
      --ink: #f5f5f1;
      --muted: rgba(245, 245, 241, 0.66);
      --olive: #c9cbc5;
      --olive-light: rgba(245, 245, 241, 0.38);
      --gold: #d0ad56;
      --gold-light: #f1d27a;
      --gold-dark: #8a6a2a;
      --line: rgba(245, 245, 241, 0.11);
      --sans: "Helvetica Now Display", "Helvetica Now Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --mono: "Helvetica Now Display", "Helvetica Now Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 78% 72%, rgba(245, 245, 241, 0.075), transparent 34rem),
        radial-gradient(circle at 18% 18%, rgba(0, 0, 0, 0.10), transparent 30rem),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(245,245,241,0.16) 0.5px, transparent 0.5px);
      background-size: 4px 4px;
      opacity: 0.10;
      mix-blend-mode: screen;
    }

    .frame {
      min-height: 100svh;
      position: relative;
      padding: clamp(34px, 5vw, 82px);
      display: grid;
      grid-template-columns: minmax(300px, 0.95fr) minmax(320px, 1.05fr);
      grid-template-rows: 1fr;
      align-items: center;
      gap: clamp(42px, 6vw, 96px);
      overflow: visible;
    }

    .title-stack {
      position: relative;
      z-index: 2;
      width: min(760px, 100%);
    }

    .name {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      font-size: clamp(54px, 7.4vw, 112px);
      line-height: 0.92;
      font-weight: 300;
      letter-spacing: -0.064em;
      text-transform: none;
      text-rendering: geometricPrecision;
    }

    .name span {
      display: block;
      white-space: nowrap;
    }

    .name span + span {
      margin-top: -0.02em;
      letter-spacing: -0.055em;
    }

    .mark-stack {
      position: relative;
      z-index: 2;
      justify-self: end;
      width: min(44vw, 660px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .tagline {
      position: relative;
      z-index: 2;
      margin: clamp(18px, 2.2vw, 30px) 0 0 0;
      max-width: 42ch;
      color: var(--ink);
      font-family: var(--mono);
      font-size: clamp(12px, 1.22vw, 19px);
      line-height: 1.16;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .glyph {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      opacity: 0.98;
    }

    .glyph svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 20px 30px rgba(17, 19, 15, 0.10));
    }

    .compass-ring {
      fill: none;
      stroke: rgba(245, 245, 241, 0.24);
      stroke-width: 1.15;
    }

    .compass-ring.faint {
      stroke: rgba(245, 245, 241, 0.12);
      stroke-width: 0.9;
    }

    .compass-star {
      fill: rgba(208, 173, 86, 0.22);
      stroke: rgba(245, 245, 241, 0.76);
      stroke-width: 1.45;
      stroke-linejoin: round;
    }

    .compass-star.alt {
      fill: rgba(17, 19, 15, 0.28);
      stroke: rgba(245, 245, 241, 0.48);
    }

    .compass-axis {
      fill: none;
      stroke: rgba(245, 245, 241, 0.68);
      stroke-width: 1.25;
      stroke-linecap: round;
    }

    .compass-axis.gold {
      stroke: url(#spiralGold);
      stroke-width: 2;
    }

    .map-halo {
      fill: rgba(245, 245, 241, 0.045);
    }

    .map-plane {
      fill: rgba(245, 245, 241, 0.12);
      stroke: rgba(245, 245, 241, 0.18);
      stroke-width: 1.1;
    }

    .map-grid {
      fill: none;
      stroke: rgba(245, 245, 241, 0.18);
      stroke-width: 0.95;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .map-vector {
      fill: none;
      stroke: var(--ink);
      stroke-width: 1.55;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.72;
    }

    .map-vector.light {
      stroke: rgba(245, 245, 241, 0.34);
      stroke-width: 1.25;
      opacity: 0.9;
    }

    .graph-guide {
      fill: none;
      stroke: rgba(196, 148, 46, 0.18);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 5 10;
    }

    .graph-edge {
      fill: none;
      stroke: url(#spiralGold);
      stroke-width: 2.15;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.88;
    }

    .graph-edge.secondary {
      stroke: rgba(245, 245, 241, 0.36);
      stroke-width: 1.1;
      opacity: 0.74;
    }

    .gold-axis {
      fill: none;
      stroke: rgba(196, 148, 46, 0.30);
      stroke-width: 1.05;
      stroke-linecap: round;
    }

    .graph-node {
      fill: url(#spiralGold);
      stroke: rgba(248, 247, 240, 0.96);
      stroke-width: 3;
      filter: drop-shadow(0 4px 9px rgba(128, 83, 20, 0.18));
    }

    .graph-node.dark {
      fill: #11130f;
      stroke: rgba(245, 245, 241, 0.84);
      stroke-width: 2.4;
      filter: none;
    }

    .graph-node.core {
      stroke: rgba(17, 19, 15, 0.78);
      stroke-width: 1.35;
    }

    @media (max-width: 720px) {
      .frame {
        grid-template-columns: 1fr;
        align-content: start;
        gap: clamp(34px, 8vh, 72px);
      }
      .title-stack {
        width: min(600px, calc(100vw - 48px));
      }
      .name {
        font-size: clamp(48px, 16vw, 76px);
        line-height: 0.94;
      }
      .mark-stack {
        justify-self: start;
        width: min(92vw, 520px);
      }
      .tagline {
        max-width: min(42ch, calc(100vw - 48px));
        margin-top: 20px;
        font-size: clamp(11px, 3.1vw, 15px);
        letter-spacing: 0.08em;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .compass-ring,
      .compass-star,
      .compass-axis,
      .map-plane,
      .map-grid,
      .map-vector,
      .graph-edge,
      .graph-guide,
      .gold-axis,
      .graph-node {
        animation: settle .95s cubic-bezier(.16,.9,.18,1) both;
      }
      .graph-edge,
      .graph-node { animation-delay: .12s; }
      @keyframes settle {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="Distributed Knowledge">
    <section class="title-stack" aria-label="Distributed Knowledge mission">

        <g>

      </svg>
      </div>
    </section>
  </main>
</body>
</html>
